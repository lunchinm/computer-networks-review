<div class="source-note">

<script>
var Q = [
  {"type": "choice", "points": 2, "question": "URL 是：", "options": ["A. 超文本传输协议", "B. 超文本标记语言", "C. 文本传输协议", "D. 统一资源定位器"], "answer": 3, "explanation": "URL（Uniform Resource Locator）统一资源定位器。HTTP 是超文本传输协议，HTML 是超文本标记语言。"},
  {"type": "choice", "points": 2, "question": "关于交换机式网络和路由式网络的描述，以下哪个是错误的？", "options": ["A. 交换机根据 MAC 地址转发", "B. 路由器根据 IP 地址转发", "C. 交换机能隔离广播域", "D. 路由器能隔离广播域"], "answer": 2, "explanation": "交换机不能隔离广播域（除非配置 VLAN），它只能隔离冲突域。路由器可以隔离广播域。"},
  {"type": "choice", "points": 2, "question": "从实时性角度看，哪种交换方式的传输延迟时间最小？", "options": ["A. 电路交换", "B. 报文交换", "C. 数据报分组交换", "D. 虚电路分组交换"], "answer": 0, "explanation": "电路交换建立连接后独占物理通路，传输延迟最小。分组交换（数据报/虚电路）有存储转发延迟。报文交换延迟最大。"},
  {"type": "choice", "points": 2, "question": "集线器带宽的分配方式是：", "options": ["A. 独占带宽", "B. 共享带宽", "C. 按需分配", "D. 按优先级分配"], "answer": 1, "explanation": "集线器工作在物理层，所有端口共享同一带宽，同一时刻只有一个端口可以发送数据。交换机则是每个端口独占带宽。"},
  {"type": "choice", "points": 2, "question": "以下哪种介质访问控制方法不存在冲突问题？", "options": ["A. CDMA", "B. CSMA", "C. TDMA", "D. FDMA"], "answer": 2, "explanation": "TDMA（时分多址）将时间划分为固定时隙，每个用户独占自己的时隙，不存在冲突。CDMA 使用不同编码，各用户同时通信。CSMA 有冲突风险。FDMA 按频率划分，也不存在冲突——此题注意：CSMA 是有冲突的，TDMA 和 FDMA 都无冲突，但选项中是单选，CDMA 也基本无冲突。最佳选 C（TDMA）。"},
  {"type": "choice", "points": 2, "question": "以下哪个不是路由选择协议？", "options": ["A. OSPF", "B. RIP", "C. BGP", "D. ICMP"], "answer": 3, "explanation": "ICMP 是互联网控制报文协议，用于差错报告和网络诊断（如 ping），不是路由选择协议。OSPF、RIP 是内部网关协议，BGP 是外部网关协议。"},
  {"type": "choice", "points": 2, "question": "在网络性能衡量中，以下哪个不是性能度量（metric）？", "options": ["A. delay（延迟）", "B. throughput（吞吐量）", "C. congestion（拥塞）", "D. packet loss（丢包率）"], "answer": 2, "explanation": "congestion（拥塞）是导致性能下降的原因，而不是衡量性能的度量。delay、throughput、packet loss 都是网络性能的度量指标。"},
  {"type": "choice", "points": 2, "question": "下列哪种延迟类型是不确定的（即随网络负载变化）？", "options": ["A. 处理延迟", "B. 排队延迟", "C. 传输延迟", "D. 传播延迟"], "answer": 1, "explanation": "排队延迟取决于队列长度和网络拥塞程度，是唯一不确定的延迟。处理延迟通常固定，传输延迟=数据量/带宽，传播延迟=距离/光速。"},
  {"type": "choice", "points": 2, "question": "考虑 CRC 差错校验，生成多项式 $G=1011$，数据 $D=1100$，则 $R$ 的值是：", "options": ["A. 100", "B. 011", "C. 001", "D. 010"], "answer": 3, "explanation": "$G=1011$ 是 4 位 → R 为 3 位。$D \\cdot 2^3 = 1100000$。做二进制除法（异或）：1100000 ÷ 1011，得余数 010。"},
  {"type": "choice", "points": 2, "question": "一个网络 172.12.0.0/16 被划分为 128 个规模相同的子网，则每个子网可分配的最大 IP 地址数量是：", "options": ["A. 256", "B. 512", "C. 510", "D. 254"], "answer": 2, "explanation": "总共 $2^{16}=65536$ 个地址，除以 128 得每子网 512 个地址，除去主机位全 0（网络地址）和全 1（广播地址），剩 510 个可用。"},
  {"type": "choice", "points": 2, "question": "以下关于 TCP 和 UDP 的对比，错误的是：", "options": ["A. TCP 面向连接，UDP 无连接", "B. TCP 提供可靠传输，UDP 不保证可靠", "C. TCP 有拥塞控制，UDP 没有", "D. TCP 首部比 UDP 首部小"], "answer": 3, "explanation": "TCP 首部至少 20 字节，UDP 首部仅 8 字节，TCP 首部更大。"},
  {"type": "choice", "points": 2, "question": "TCP 三次握手后，连接的状态是：", "options": ["A. 只有客户端确认连接", "B. 只有服务器确认连接", "C. 双方都确认连接", "D. 双方都未确认"], "answer": 2, "explanation": "三次握手完成后，客户端和服务器都确认了对方的发送和接收能力正常，双方都进入 ESTABLISHED 状态。"},
  {"type": "choice", "points": 2, "question": "下列关于 HTTP 和 FTP 的比较，正确的是：", "options": ["A. 两者都使用 TCP", "B. FTP 只有一个连接", "C. HTTP 是带外传输控制信息", "D. FTP 是无状态协议"], "answer": 0, "explanation": "HTTP 和 FTP 都基于 TCP。FTP 需要两个连接（控制 21 + 数据 20），HTTP 是无状态的，FTP 是带外传输（控制连接和数据连接分离）。"},
  {"type": "choice", "points": 2, "question": "在 CSMA/CD 网络中，争用期的长度等于：", "options": ["A. 单程端到端传播时延 τ", "B. 往返传播时延 2τ", "C. 一个最短帧的发送时间", "D. 随机时间"], "answer": 1, "explanation": "争用期 = 2τ（往返传播时延）。在最坏情况下，数据到达接收方前一刻发生碰撞，碰撞信号返回发送方需要 τ，总共 2τ 才能检测到。"},
  {"type": "choice", "points": 2, "question": "交换机转发帧所依据的信息是：", "options": ["A. IP 地址", "B. MAC 地址", "C. 端口号", "D. 域名"], "answer": 1, "explanation": "交换机工作在数据链路层，根据目的 MAC 地址查找转发表来转发帧。路由器根据 IP 地址转发。"},
  {"type": "choice", "points": 2, "question": "OSPF 协议使用的算法是：", "options": ["A. Bellman-Ford", "B. Dijkstra 最短路径优先", "C. 距离向量", "D. 路径向量"], "answer": 1, "explanation": "OSPF（开放最短路径优先）使用 Dijkstra SPF 算法。RIP 使用距离向量（Bellman-Ford），BGP 使用路径向量。"},
  {"type": "choice", "points": 2, "question": "DNS 使用哪个运输层协议？", "options": ["A. 仅 TCP", "B. 仅 UDP", "C. 主要使用 UDP，区域传送使用 TCP", "D. 主要使用 TCP，少量使用 UDP"], "answer": 2, "explanation": "DNS 查询和响应主要使用 UDP（端口 53），因为数据量小、要求快速。区域传送（AXFR）使用 TCP 保证可靠。"},
  {"type": "choice", "points": 2, "question": "IPv6 地址长度为多少位？", "options": ["A. 32", "B. 48", "C. 64", "D. 128"], "answer": 3, "explanation": "IPv6 地址为 128 位（16 字节），通常用冒号十六进制表示。IPv4 为 32 位，MAC 地址为 48 位。"},
  {"type": "choice", "points": 2, "question": "CIDR 路由选择采用什么原则？", "options": ["A. 最短路径优先", "B. 最长前缀匹配", "C. 最短前缀匹配", "D. 轮询"], "answer": 1, "explanation": "CIDR（无分类域间路由）使用最长前缀匹配（Longest Prefix Match）原则，即选择与目的地址匹配前缀最长的路由条目。"},
  {"type": "choice", "points": 2, "question": "下列关于 NAT 的说法，正确的是：", "options": ["A. NAT 路由器工作在数据链路层", "B. NAT 只需要修改源 IP 地址", "C. NAT 可以缓解 IPv4 地址枯竭问题", "D. NAT 对所有应用都是透明的"], "answer": 2, "explanation": "NAT 工作在网络层，修改 IP 数据报的源/目的 IP 地址和端口号。NAT 可以有效缓解 IPv4 地址枯竭。但并非所有应用都透明（如某些 P2P 应用需要特殊处理）。"},

  {"type": "tf", "points": 1, "question": "协议是“水平的”（控制对等层通信），服务是“垂直的”（下层为上层提供服务）。", "answer": 0},
  {"type": "tf", "points": 1, "question": "奈氏准则给出了有噪声条件下信道信息传输速率的上限。", "answer": 1, "explanation": "奈氏准则针对无噪声信道（$C=2W\\log_2 V$）。有噪声信道看香农公式（$C=W\\log_2(1+S/N)$）。"},
  {"type": "tf", "points": 1, "question": "以太网交换机根据 IP 地址转发帧。", "answer": 1, "explanation": "交换机根据 MAC 地址（数据链路层地址）转发帧。"},
  {"type": "tf", "points": 1, "question": "TCP 的滑动窗口以报文段为单位。", "answer": 1, "explanation": "TCP 的滑动窗口以字节为单位。"},
  {"type": "tf", "points": 1, "question": "HTTP 是无状态协议。", "answer": 0, "explanation": "HTTP 协议本身不保存客户端的状态信息，每个请求都是独立的。"},
  {"type": "tf", "points": 1, "question": "FTP 只需要一个 TCP 连接即可完成文件传输。", "answer": 1, "explanation": "FTP 使用两个 TCP 连接：控制连接（端口 21）+ 数据连接（端口 20）。"},
  {"type": "tf", "points": 1, "question": "路由器在转发分组时使用了运输层和应用层。", "answer": 1, "explanation": "路由器最高只用到网络层（IP 层），不需要运输层和应用层。"},
  {"type": "tf", "points": 1, "question": "UDP 提供拥塞控制机制。", "answer": 1, "explanation": "UDP 无连接、无拥塞控制，发送方可以任意速率发送数据。"},
  {"type": "tf", "points": 1, "question": "DHCP 服务器可以为客户端分配固定的 IP 地址。", "answer": 0, "explanation": "DHCP 支持静态绑定（MAC 地址绑定固定 IP），可以实现为特定客户端分配固定 IP。"},
  {"type": "tf", "points": 1, "question": "在分组交换网络中，所有分组经过的路径一定相同。", "answer": 1, "explanation": "数据报方式中分组可以走不同路径，虚电路方式中分组走相同路径。"},

  {"type": "fill", "points": 2, "question": "香农公式：$C = W\\log_2(1 + \\frac{____}{____})$，其中信噪比常用单位是____。", "answer": ["S", "N", "dB"]},
  {"type": "fill", "points": 2, "question": "HTTP 状态码 200 表示____，301 表示____，404 表示____，500 表示____。", "answer": ["OK", "永久重定向", "未找到", "服务器内部错误"]},
  {"type": "fill", "points": 2, "question": "ARP 协议将____地址解析为____地址，RARP 则相反。", "answer": ["IP", "MAC"]},
  {"type": "fill", "points": 2, "question": "TCP 首部中的____字段用于流量控制，发送窗口 = min(____, ____)。", "answer": ["窗口", "拥塞窗口", "接收窗口"]},
  {"type": "fill", "points": 2, "question": "PPP 协议的三个组成部分：____、____、____。", "answer": ["封装成帧", "链路控制协议", "网络控制协议"]},
  {"type": "fill", "points": 2, "question": "网桥通过____算法避免环路，交换机通过____建立转发表。", "answer": ["生成树", "自学习"]},

  {"type": "short", "points": 8, "question": "简述 CSMA/CD 的工作流程，并说明为什么要有最小帧长限制。", "answer": -1, "explanation": "<strong>工作流程：</strong><br>(1) 先听后发：发送前监听，忙则等待<br>(2) 边发边听：发送时持续监听<br>(3) 冲突停发：检测到碰撞→停发+Jam 信号<br>(4) 随机退避：二进制指数退避后重试<br>(5) 16 次失败则丢弃帧<br><br><strong>最小帧长原因：</strong>为了在发送完帧之前能检测到碰撞。要求帧的发送时间 ≥ 2τ（争用期）。以太网最小帧长 64 字节 = 2τ × 速率。如果帧太短，发送完了还没检测到碰撞，就认为发送成功了，但实际上可能碰撞了。"},

  {"type": "comprehensive", "points": 12, "question": "请完整描述 TCP 拥塞控制的四种算法（慢开始、拥塞避免、快重传、快恢复），并说明它们的触发条件和窗口变化规律。", "answer": -1, "explanation": "<strong>1. 慢开始（Slow Start）：</strong><br>• 触发：连接建立时或超时后<br>• cwnd 从 1 MSS 开始，每收到一个 ACK，cwnd +1<br>• 效果：每 RTT，cwnd 翻倍（指数增长）<br>• 直到 cwnd ≥ ssthresh，转入拥塞避免<br><br><strong>2. 拥塞避免（Congestion Avoidance）：</strong><br>• 每 RTT，cwnd +1 MSS（线性增长）<br>• 检测到超时：ssthresh = cwnd/2，cwnd = 1，重新慢开始<br><br><strong>3. 快重传（Fast Retransmit）：</strong><br>• 触发：收到 3 个重复 ACK<br>• 不等超时，立即重传丢失的报文段<br><br><strong>4. 快恢复（Fast Recovery）：</strong><br>• 触发：快重传后（3 dup ACK 而非超时）<br>• ssthresh = cwnd/2，cwnd = ssthresh（不减到 1）<br>• 直接进入拥塞避免阶段<br><br><strong>发送窗口 = min(cwnd, rwnd)</strong>"}
];

var LABELS = {"page_title": "章节测试", "section": {"choice": "一、选择题（每题2分，共40分）", "tf": "二、判断题（每题1分，共10分）", "fill": "三、填空题（每空2分，共12分）", "short": "四、简答题（每题8分，共32分）", "calc": "五、计算题（10分）", "comprehensive": "六、综合分析题（12分）"}, "section_order": ["choice", "tf", "fill", "short", "calc", "comprehensive"], "points_suffix": "分", "true_label": "正确", "false_label": "错误", "placeholder": "在此作答...", "pitfall_prefix": "易错提醒：", "correct_label": "正确", "wrong_label": "错误", "partial_label": "部分正确", "answer_prefix": "正确答案：", "reference_label": "参考答案", "graded_label": "已批改", "grade_button": "提交批改", "score_label": "总分", "duration_prefix": "满分 100 分 | 建议 ", "duration_suffix": " 分钟 | 选择答案后点击提交批改"};

// ─── Answer normalization ───
function tfAnswerIndex(ans) {
  if (typeof ans === 'boolean') return ans ? 0 : 1;
  if (typeof ans === 'number') return ans === 0 ? 0 : 1;
  var s = ('' + ans).trim().toLowerCase();
  var truthy = ['0', 't', 'true', '正确', '对', '是', 'yes', 'y', '√', '✓'];
  var falsy  = ['1', 'f', 'false', '错误', '错', '否', 'no', 'n', '×', 'x'];
  if (truthy.indexOf(s) !== -1) return 0;
  if (falsy.indexOf(s) !== -1) return 1;
  return ans ? 0 : 1;
}

function choiceAnswerIndex(ans, options) {
  if (typeof ans === 'number') return ans;
  var s = ('' + ans).trim();
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 65;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (options) { for (var i = 0; i < options.length; i++) { if (('' + options[i]).trim() === s) return i; } }
  return parseInt(s, 10);
}

function normText(s) {
  s = ('' + s).trim().toLowerCase();
  s = s.replace(/[\s　]+/g, '');
  s = s.replace(/[.,;:!?。，、；：！？“”"'（）()【】\[\]<>《》]/g, '');
  s = s.replace(/[！-～]/g, function (c) { return String.fromCharCode(c.charCodeAt(0) - 0xfee0); });
  return s;
}

function fillBlankCount(question) { var m = ('' + question).match(/(_{2,}|＿+)/g); return m ? m.length : 0; }

function fillBlankAnswers(ans, nBlanks) {
  if (nBlanks < 1) nBlanks = 1;
  if (!Array.isArray(ans)) return padBlanks([[ans]], nBlanks);
  if (ans.length && Array.isArray(ans[0])) return padBlanks(ans, nBlanks);
  if (nBlanks === 1) return [ans];
  if (ans.length === nBlanks) { return ans.map(function (a) { return [a]; }); }
  return padBlanks([ans], nBlanks);
}

function padBlanks(arr, n) { var out = arr.slice(0, n); while (out.length < n) out.push(['']); return out; }

function build() {
  var container = document.getElementById('questions-container');
  if (!container) return;
  var order = LABELS.section_order || [];
  Q.forEach(function (q, i) { q._i = i; });
  Q.sort(function (a, b) { var oa = order.indexOf(a.type); if (oa === -1) oa = 99; var ob = order.indexOf(b.type); if (ob === -1) ob = 99; return oa - ob || a._i - b._i; });
  var h = '', sec = '', titles = LABELS.section;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    if (q.type !== sec) { sec = q.type; if (titles[q.type]) h += '<h3>' + titles[q.type] + '</h3>'; }
    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num"><span class="q-num-n">' + (i + 1) + '</span>. <span class="q-pts">（' + q.points + ' ' + LABELS.points_suffix + '）</span></div>';
    if (q.type === 'fill') { h += '<div class="q-text">' + renderFill(q, qid) + '</div>'; }
    else { h += '<div class="q-text">' + q.question + '</div>'; }
    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + opts[j] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)"><input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)"><input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else if (q.type === 'fill') { /* already rendered */ }
    else { h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>'; }
    h += '<div class="result" id="result-' + qid + '"><span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + (q.explanation || '') + '</div></div></div>';
  }
  container.innerHTML = h;
  if (window.MathJax && MathJax.typesetPromise) { MathJax.typesetPromise([container]).catch(function (err) { console.error(err); }); }
}

function renderFill(q, qid) {
  var k = 0;
  var html = ('' + q.question).replace(/(_{2,}|＿+)/g, function () {
    var inp = '<input type="text" class="fill-input" id="fill-' + qid + '-' + k + '" autocomplete="off" spellcheck="false">';
    k++;
    return inp;
  });
  return html;
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') { build(); }

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) target.classList.add('selected');
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) radio.checked = true;
}

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i], qid = 'q' + i;
    var card = document.getElementById('card-' + qid), result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid), correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;
    result.style.display = 'block';
    if (q.type === 'choice' || q.type === 'tf') { score += gradeSingle(q, qid, card, badge, correctEl); }
    else if (q.type === 'fill') { score += gradeFill(q, qid, card, badge, correctEl); }
    else { card.classList.add('correct'); badge.className = 'badge badge-ref'; badge.textContent = LABELS.reference_label; }
  }
  var sb = document.getElementById('score-box');
  if (sb) { sb.style.display = 'block'; document.getElementById('score-num').textContent = roundScore(score); sb.scrollIntoView({ behavior: 'smooth' }); }
  var opts = document.querySelectorAll('.option'); for (var a = 0; a < opts.length; a++) opts[a].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea'); for (var b = 0; b < tas.length; b++) tas[b].disabled = true;
  var fis = document.querySelectorAll('.fill-input'); for (var c = 0; c < fis.length; c++) fis[c].disabled = true;
  var btn = document.getElementById('grade-btn'); if (btn) { btn.disabled = true; btn.textContent = LABELS.graded_label; }
}

function roundScore(s) { return Math.round(s * 10) / 10; }

function gradeSingle(q, qid, card, badge, correctEl) {
  var ansIdx = q.type === 'tf' ? tfAnswerIndex(q.answer) : choiceAnswerIndex(q.answer, q.options);
  var radio = document.querySelector('input[name="' + qid + '"]:checked');
  if (radio && parseInt(radio.value, 10) === ansIdx) {
    card.classList.add('correct'); badge.className = 'badge badge-ok'; badge.textContent = LABELS.correct_label; correctEl.innerHTML = '';
    var ok = document.getElementById('opt-' + qid + '-' + ansIdx); if (ok) ok.classList.add('correct-answer');
    return q.points;
  }
  card.classList.add('wrong'); badge.className = 'badge badge-no'; badge.textContent = LABELS.wrong_label;
  var ansText = q.type === 'choice' ? (q.options ? q.options[ansIdx] : '') : (ansIdx === 0 ? LABELS.true_label : LABELS.false_label);
  correctEl.innerHTML = LABELS.answer_prefix + ansText;
  if (radio) { var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value); if (wrongOpt) wrongOpt.classList.add('wrong-answer'); }
  var corr = document.getElementById('opt-' + qid + '-' + ansIdx); if (corr) corr.classList.add('correct-answer');
  return 0;
}

function gradeFill(q, qid, card, badge, correctEl) {
  var nBlanks = fillBlankCount(q.question);
  var blanks = fillBlankAnswers(q.answer, nBlanks), n = blanks.length, hit = 0, displays = [];
  for (var b = 0; b < n; b++) {
    var inp = document.getElementById('fill-' + qid + '-' + b);
    var accepted = blanks[b] || [''];
    var user = inp ? normText(inp.value) : '';
    var ok = false;
    for (var a = 0; a < accepted.length; a++) { if (accepted[a] !== '' && normText(accepted[a]) === user && user !== '') { ok = true; break; } }
    if (inp) inp.classList.add(ok ? 'fill-ok' : 'fill-no');
    if (ok) hit++;
    displays.push((n > 1 ? (b + 1) + '. ' : '') + accepted.filter(function (x) { return x !== ''; }).join(' / '));
  }
  var earned = roundScore(q.points * hit / n);
  correctEl.innerHTML = LABELS.answer_prefix + displays.join('   ');
  if (hit === n) { card.classList.add('correct'); badge.className = 'badge badge-ok'; badge.textContent = LABELS.correct_label; }
  else if (hit > 0) { card.classList.add('partial'); badge.className = 'badge badge-partial'; badge.textContent = LABELS.partial_label; }
  else { card.classList.add('wrong'); badge.className = 'badge badge-no'; badge.textContent = LABELS.wrong_label; }
  return earned;
}
</script>
